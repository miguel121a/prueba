<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/stylePrincipal.css">
    <link rel="stylesheet" href="../css/styleForms.css">
    <title>Contáctanos - Salus CMA</title>
</head>

<body>

    <header>
        <img src="../img/logo.png" alt="Logotipo principal de la empresa" id="logo" />
        <div class="centro">
            <nav>
                <h1>Salus CMA</h1>
                <ul>
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="vision.html">Visión y Misión</a></li>
                    <li><a href="personal.html">Personal</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                    <li><a href="mapaPrincipal.html">Mapa de sitio</a></li>
                </ul>
            </nav>
        </div>
        <div class="perfil-container" id="perfil-container">
            <a href="loginn.html">
                <img id="perfil" src="../img/perfil.png" alt="Perfil">
                <p>Iniciar sesión</p>
            </a>
        </div>
    </header>

    <!-- ================================================================
         MAIN — Formulario de contacto
         API: POST /contacto-mensaje → { nombre, telefono, correo, mensaje }
         contacto.js intercepta el submit, hace el POST y muestra
         resultado en #mensajeContacto.
    ================================================================ -->
    <main class="mainUnaColumna">
        <h2>Contáctanos</h2>

        <form id="formContacto">

            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" maxlength="100" required
                title="Ingrese su nombre completo" placeholder="Ej. Juan Pérez García"><br><br>

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono"
                pattern="^(\+52\s?)?\d{10}$"
                title="Ingrese un teléfono válido, 10 dígitos, con opción a +52"
                placeholder="Ej. 7821234567" required>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo"
                pattern="^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$"
                title="Ingrese un correo válido"
                placeholder="Ej. juan@correo.com" required><br><br>

            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="8" maxlength="1000" required
                placeholder="Escriba su mensaje o preguntas"></textarea><br><br>

            <label id="mensajeContacto" style="color: black; display: block; margin-bottom: 10px;"></label>

            <button type="button" onclick="window.location.href='index.html'">Cancelar</button>
            <button type="reset">Limpiar</button>
            <button type="submit">Enviar</button>

        </form>
    </main>

    <!-- ================================================================
         FOOTER
         API: GET /contacto → { correo, telefono, direccion }
         API: GET /footer   → { facebook, instagram, x, mapa, img_* }
         Contenido estático de ejemplo:
    ================================================================ -->
    <footer>
        <div class="footer-container">
            <div class="footer-section contact" id="footer-contacto">
                <h3>Contacto</h3>
                <p>Email: <a href="mailto:contacto@saluscma.com">contacto@saluscma.com</a></p>
                <p>Teléfono: <a href="tel:7821234567">782 123 4567</a></p>
                <p>Dirección: Av. Ejemplo 123, Poza Rica, Ver.</p>
            </div>
            <div class="footer-section links" id="footer-redes">
                <h3>Enlaces</h3>
                <a href="#"><img src="../img/facebook.png" alt="Facebook" width="30" height="30"></a>
                <a href="#"><img src="../img/instagram.png" alt="Instagram" width="30" height="30"></a>
            </div>
            <div id="footer-mapa-container">
                <!-- JS insertará iframe del mapa -->
            </div>
        </div>
    </footer>

</body>
</html>
